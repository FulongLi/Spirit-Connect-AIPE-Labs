---
layout: default
---
<header class="hero hero-compact">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  </div>
</header>

<section class="section">
  <div class="container">
    <article class="post-article">
      {{ content }}
    </article>
    <p class="post-back">
      {% if page.lang == 'zh' %}
      <a href="{{ '/zh/resources/blog/' | relative_url }}">← 返回博客</a>
      {% else %}
      <a href="{{ '/resources/blog/' | relative_url }}">← Back to blog</a>
      {% endif %}
    </p>
  </div>
</section>
