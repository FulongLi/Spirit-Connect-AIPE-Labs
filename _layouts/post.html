---
layout: default
---
<header class="hero hero-compact">
  <div class="container">
    <span class="badge">Blog</span>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  </div>
</header>

<section class="section">
  <div class="container">
    <article class="post-article">
      {{ content }}
    </article>
    <p style="margin-top:3rem;"><a href="{{ '/resources/blog/' | relative_url }}">← Back to Blog</a></p>
  </div>
</section>
