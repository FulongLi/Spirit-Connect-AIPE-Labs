---
layout: default
---
<header class="hero hero-compact">
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </div>
</header>

<section class="section">
  <div class="container">
    <article class="post-article legal-article">
      {{ content }}
    </article>
  </div>
</section>
