<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  {% include favicon.html %}
  <link rel="canonical" href="{{ site.url }}{{ page.redirect_to | relative_url }}">
  <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
  <title>{{ page.title | default: 'Page moved' }} – {{ site.title }}</title>
</head>
<body>
  <p>
    {% if page.lang == 'zh' %}页面已移动至{% else %}This page has moved to{% endif %}
    <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to }}</a>.
  </p>
  <script>window.location.replace({{ page.redirect_to | relative_url | jsonify }});</script>
</body>
</html>
