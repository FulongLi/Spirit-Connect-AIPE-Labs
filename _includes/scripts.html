<script>
const burger = document.querySelector('.hamburger');
const menu   = document.getElementById('mainmenu');
if (burger && menu){
  burger.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    burger.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
}
document.querySelectorAll('.drop-toggle').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const dd = e.currentTarget.closest('.dropdown');
    dd.classList.toggle('open');
    btn.setAttribute('aria-expanded', dd.classList.contains('open') ? 'true' : 'false');
  });
  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
  });
});
document.querySelectorAll('.copy-btn[data-copy-target]').forEach(btn => {
  const idleLabel = btn.textContent.trim();
  const copiedLabel = btn.dataset.copiedLabel || 'Copied!';
  btn.addEventListener('click', () => {
    const el = document.getElementById(btn.dataset.copyTarget);
    if (!el) return;
    const text = el.textContent.trim();
    const done = () => {
      btn.classList.add('copied');
      btn.textContent = copiedLabel;
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = idleLabel; }, 2000);
    };
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
  });
});
document.querySelectorAll('.faq-item').forEach(item => {
  const q = item.querySelector('.faq-q');
  const a = item.querySelector('.faq-a');
  if (!q || !a) return;
  q.addEventListener('click', () => {
    const isOpen = item.classList.toggle('open');
    q.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    a.style.maxHeight = isOpen ? a.scrollHeight + 'px' : null;
  });
});
window.addEventListener('resize', () => {
  document.querySelectorAll('.faq-item.open .faq-a').forEach(a => {
    a.style.maxHeight = a.scrollHeight + 'px';
  });
});
</script>
