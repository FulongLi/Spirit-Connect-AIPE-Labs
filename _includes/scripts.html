<script>
const burger = document.querySelector('.hamburger');
const menu   = document.getElementById('mainmenu');
if (burger && menu){
  burger.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    burger.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
}
document.querySelectorAll('.drop-toggle').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const dd = e.currentTarget.closest('.dropdown');
    dd.classList.toggle('open');
    btn.setAttribute('aria-expanded', dd.classList.contains('open') ? 'true' : 'false');
  });
  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
  });
});

document.querySelectorAll('[data-auto-scroll]').forEach(panel => {
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const speed = Number(panel.dataset.scrollSpeed || 16);
  let paused = false;
  let lastFrame = 0;

  const canScroll = () => panel.scrollHeight > panel.clientHeight + 1;

  const step = timestamp => {
    if (!lastFrame) lastFrame = timestamp;
    const deltaSeconds = (timestamp - lastFrame) / 1000;
    lastFrame = timestamp;

    if (!paused && !reduceMotion && canScroll()) {
      const maxScroll = panel.scrollHeight - panel.clientHeight;
      if (panel.scrollTop >= maxScroll - 1) {
        panel.scrollTop = 0;
      } else {
        panel.scrollTop += speed * deltaSeconds;
      }
    }

    window.requestAnimationFrame(step);
  };

  panel.addEventListener('mouseenter', () => { paused = true; });
  panel.addEventListener('mouseleave', () => { paused = false; });
  panel.addEventListener('focusin', () => { paused = true; });
  panel.addEventListener('focusout', () => { paused = false; });

  window.requestAnimationFrame(step);
});
</script>
